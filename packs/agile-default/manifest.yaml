pack:
  id: "agile-default"
  name: "Agile Engineering Defaults"
  version: "0.1.0-starter"
  compatible_core: ">=2.0,<3.0"
  description: |
    Pack for engineering teams running Scrum/Kanban with release trains. Configures
    sprint cadence, retro templates, release-phase model. Does not assume a funder
    or customer; pair with another pack for those.
  authors:
    - "David Olsson <david@atomic47.co>"
  released: "2026-04-27"
  maturity: "starter"

provides:
  profiles:
    - review-meeting     # sprint retrospective
    - phase-gate         # sprint phases
  reporting_matrix_defaults: true
