id: R-07-timeline-overload
kind: risk
title: "Overlapping milestone timeline for a single person — 9 milestones in 5 months"
likelihood: high
impact: high
score: 9
owner: david-olsson-worksona
mitigation: "Ruthlessly prioritize. Highest-value milestones are M09 (validation suite — prevents silent corruption) and M02 (pack hardening — makes the system usable beyond PIC). Defer M03 (matrix editor), M07 (multi-project dashboard), and M04 (pack registry) to v2.2+. Accept that v2.1 will be smaller than planned."
contingency: "If timeline slips, communicate openly via blog and changelog. Substrate format is stable — users are not blocked, they just don't get new features."
